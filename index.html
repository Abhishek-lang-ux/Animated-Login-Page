<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated login Page</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <input type="checkbox" id="toggle" class="toggle-checkbox hidden">
      <div class="form-container sign-up">
        <form>
          <h1>Create Account</h1>
          <div class="social-icons">
            <div class="icons">
              <i class="fa-brands fa-google-plus-g"></i>
            </div>
            <div class="icons">
              <i class="fa-brands fa-facebook"></i>
            </div>
            <div class="icons">
              <i class="fa-brands fa-github"></i>
            </div>
            <div class="icons">
              <i class="fa-brands fa-linkedin-in"></i>
            </div>
          </div>
          <span>or use your email for registraion</span>
          <input type="username" placeholder="Name" />
          <input type="email" placeholder="Email" />
          <input type="password" placeholder="Password" />
          <button>SIGN-UP</button>
        </form>
      </div>
      <div class="form-container sign-in">
        <form>
          <h1>Sign In</h1>
          <div class="social-icons">
            <div class="icons">
              <i class="fa-brands fa-google-plus-g"></i>
            </div>
            <div class="icons">
              <i class="fa-brands fa-facebook"></i>
            </div>
            <div class="icons">
              <i class="fa-brands fa-github"></i>
            </div>
            <div class="icons">
              <i class="fa-brands fa-linkedin-in"></i>
            </div>
          </div>
          <span>or use your email for registraion</span>
          <input type="email" placeholder="Email" />
          <input type="password" placeholder="Password" />
          <a href="">Forgot Your Password?</a>
          <button>SIGN-IN</button>
        </form>
      </div>
      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Welcome back!</h1>
            <p>Enter your personal detailsto use all of site features</p>
            <label for="toggle">SIGN IN</label>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Hello, Friend!</h1>
            <p>Register with your personal details to use all of site features</p>
            <label for="toggle">SIGN UP</label>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
